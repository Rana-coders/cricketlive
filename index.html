<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cricket Live Pro - PSL & IPL 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a7a3c; --secondary: #f3a352; --bg: #0b0e14; --card: #1c2128; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Barlow Condensed', sans-serif; }
        body { background: var(--bg); color: white; -webkit-tap-highlight-color: transparent; }
        
        .header { background: linear-gradient(90deg, var(--primary), var(--secondary)); padding: 15px; text-align: center; font-size: 22px; font-weight: bold; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        /* Fixed Aspect Ratio Player */
        .player-wrapper { width: 100%; background: #000; aspect-ratio: 16/9; position: relative; border-bottom: 3px solid var(--secondary); }
        #live-player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .live-tag { position: absolute; top: 10px; left: 10px; background: red; padding: 2px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; animation: blink 1s infinite; z-index: 5; }
        @keyframes blink { 50% { opacity: 0.2; } }

        .controls { padding: 20px; }
        .server-label { color: #8b949e; font-size: 14px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { background: var(--card); border: 1px solid #30363d; color: white; padding: 16px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .btn:active { transform: scale(0.95); }
        .active { background: var(--primary) !important; border-color: white; box-shadow: 0 0 15px rgba(26, 122, 60, 0.4); }

        .ad-banner { background: #161b22; margin: 15px; padding: 15px; border-radius: 8px; text-align: center; border: 1px dashed #30363d; font-size: 12px; color: #484f58; }
    </style>
</head>
<body>

    <div class="header">🏏 CRICKET LIVE PRO</div>

    <div class="player-wrapper">
        <div class="live-tag">LIVE</div>
        <iframe id="live-player" src="https://vidsrc.me/embed/cricket" allowfullscreen sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
    </div>

    <div class="ad-banner">ADVERTISEMENT SLOT (REPLACE WITH YOUR AD CODE)</div>

    <div class="controls">
        <p class="server-label">Working Streaming Servers:</p>
        <div class="grid">
            <button class="btn active" onclick="setServer('https://vidsrc.me/embed/cricket', this)">SERVER 1 (HD)</button>
            
            <button class="btn" onclick="setServer('https://1l-stream.com/live/ch1', this)">SERVER 2 (FAST)</button>
            
            <button class="btn" onclick="setServer('https://embedme.top/embed/cricket', this)">SERVER 3 (LIVE)</button>
            
            <button class="btn" onclick="setServer('https://cricfree.io/update/ch1.php', this)">SERVER 4 (BACKUP)</button>
        </div>
    </div>

    <script>
        function setServer(url, btn) {
            // Update the Iframe source
            const player = document.getElementById('live-player');
            player.src = url;
            
            // Remove 'active' class from all buttons
            const btns = document.querySelectorAll('.btn');
            btns.forEach(b => b.classList.remove('active'));
            
            // Add 'active' class to clicked button
            btn.classList.add('active');
            
            // Scroll user back to player smoothly
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    </script>

</body>
</html>
