<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cricket Live Pro - PSL & IPL 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a7a3c; --secondary: #f3a352; --bg: #000; --card: #161b22; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Barlow Condensed', sans-serif; }
        body { background: var(--bg); color: white; }
        .app-header { background: linear-gradient(90deg, var(--primary), var(--secondary)); padding: 12px; text-align: center; font-size: 20px; font-weight: bold; }
        
        /* Video Player Area */
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; border-bottom: 2px solid var(--secondary); }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* Server List */
        .controls { padding: 15px; }
        .server-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .server-btn { background: var(--card); border: 1px solid #333; color: white; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .server-btn.active { background: var(--primary); border-color: white; }
        
        .ad-box { background: #111; margin: 15px; padding: 20px; border: 1px dashed #444; text-align: center; font-size: 12px; color: #666; }
    </style>
</head>
<body>

    <div class="app-header">🏆 CRICKET LIVE PRO</div>

    <div class="video-container">
        <iframe id="stream-player" src="https://vidsrc.me/embed/cricket" allowfullscreen></iframe>
    </div>

    <div class="ad-box">ADVERTISEMENT SPACE (ADSTERRA)</div>

    <div class="controls">
        <p style="color: #888;">SELECT ACTIVE STREAM:</p>
        <div class="server-grid">
            <button class="server-btn active" onclick="play('https://vidsrc.me/embed/cricket', this)">SERVER 1 (HD)</button>
            <button class="server-btn" onclick="play('https://1l-stream.com/live/ch1', this)">SERVER 2 (Live)</button>
            <button class="server-btn" onclick="play('https://sporty.net/embed/live', this)">SERVER 3 (SD)</button>
            <button class="server-btn" onclick="play('https://crichd.vip/update/ch1.php', this)">SERVER 4 (Backup)</button>
        </div>
    </div>

    <script>
        function play(link, btn) {
            document.getElementById('stream-player').src = link;
            let allBtns = document.querySelectorAll('.server-btn');
            allBtns.forEach(b => b.classList.remove('active-btn'));
            btn.classList.add('active-btn');
        }
    </script>

</body>
</html>
